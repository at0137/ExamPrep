# 効率的市場における実効ビッド・アスク・スプレッドの簡便で間接的な測定法

リチャード・ロール (Richard Roll)

『ジャーナル・オブ・ファイナンス (The Journal of Finance)』第39巻第4号(1984年9月)pp. 1127-1139。

『ジャーナル・オブ・ファイナンス』はアメリカ・ファイナンス学会 (American Finance Association) が発行している。

# 効率的市場における実効ビッド・アスク・スプレッドの簡便で間接的な測定法

リチャード・ロール (RICHARD ROLL)*

## 要旨 (ABSTRACT)

効率的な市場では、証券の値動きが完全にランダムであるにもかかわらず、観測される取引価格の系列共分散はビッド・アスク・スプレッド (bid-ask spread) に依存して決まる。実際、観測される値動きに含まれるこの系列依存性を用いると、実効スプレッドを次式で測定できる。

$$\text{スプレッド} = 2\sqrt{-\text{cov}} \tag{}$$

ここで「cov」は連続する価格変化どうしの一次の系列共分散である。この間接的な測定値は理論的にも経験的にも有用であり、求めるのも容易である。

---

ファイナンスの研究者も実務家も、効率的な市場において投資家が直面する取引コスト (transaction cost) に関心を抱いている。本論文は、横断面データから直接的に取引コストを推定する新しい手法を提案する。

提案する測定法は、取引コストの測定が他のいくつかの理由から困難であるからこそ価値をもつ。直接的な測定は明示的なコスト要素にしか適用できず、暗黙的なコスト要素を無視してしまう。たとえばブローカーへの手数料は容易に把握できるが、ビッド・アスク・スプレッド——つまり個々の取引において支払われることの多い、手で扱いにくいコスト——は、ある程度コストをかけて記録し、その後に分析しなければならない。提案する手法は、こうした困難をいずれも回避する。市場の見積りそのものから引用された値であっても、ビッド・アスク・スプレッドは取引時点における買い手と売り手の交渉によって決まるため、より正確に把握する必要があるのである。

本論文は、実効ビッド・アスク・スプレッドを市場価格から直接測定する手法を提示する。この手法は事前情報をほとんど必要としない。実際、非常に安価である。次の2つの仮定のみを置く。

(1) 資産が情報的に効率的な市場で取引されている。
(2) 観測される価格変化の確率分布が定常的である(少なくとも短い区間において)。

これら2つの仮定が与えられたとき、実効ビッド・アスク・スプレッドの間接的な測定値が第I節で導出される。

---

## I. 間接的なビッド・アスク・スプレッド

市場に情報的な効率性があり、かつ取引コストが存在するならば、観測される市場価格には新たな情報の到来だけでは説明できない変動が含まれる¹。価格における変化、つまり価格の絶対水準よりも変化のほうに、こうした情報以外の影響が表れる。

効率的市場における取引は、買い手が支払う価格が売り手の受け取る価格を上回るという点を除けば、新たな情報のみに反応して起こる。各取引が起こるとき、価格はその時点の「真の」あるいは情報に基づく価値の周囲を、ビッド側とアスク側のいずれで成立したかに応じて上下する。つまり、たとえ情報に基づく価値が一定であっても、観測される価格はビッドとアスクのあいだを揺れ動くのである。

観測される価格変化は、したがって新しい情報の到来と、各取引がビッド側で起こったかアスク側で起こったかという2つの要因に依存する。ニーダーホッファーとオズボーン (Niederhoffer and Osborne) [9] は、負の系列依存性が市場価格変化に存在することを指摘した。彼らは、ある取引がビッドで成立すると、次の取引はアスク(価格上昇)で起こりやすく、その逆もまた成り立つ、という観察に基づいてこれを説明した。マーケットメーカーがすべての取引に関与する場合、こうしたビッド・アスク間の往復はとりわけ生じやすい。マーケットメーカーから資産を購入するとアスク価格になり、彼に売却するとビッド価格になるからである。

下図は、効率的市場における観測価格が示しうるパターンを描いたものである。連続する取引価格 $p_{t-1}$、$p_t$、$p_{t+1}$ は、たとえ情報に基づく価値そのものは変化していなくても、ビッドとアスクの両方を含む可能性がある。

```
        アスク価格 (Ask Price)
        - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -
スプレッド {                          •                  - - - - - - -  価値 (Value)
        - - - - - - - - - •  - - - - - - - - - - - - - - - - - - - -
        ビッド価格 (Bid Price)
                        t-1            t            t+1
```

このようなパターンが起こりやすい。あるビッドの後にアスクが続くことは、その逆と同程度に起こりうる。同様に、あるアスクの後にビッドが続くことも、その逆と同程度に起こりうる。

ここで $\Delta p_t \equiv p_t - p_{t-1}$ を連続する価格変化と定義する。情報の影響を無視すれば、この値動きの系列依存性は次のような同時分布をもつ²。

<div class="pagemark">p.004</div>

次の表は、$\Delta p_{t-1} = -s$(時点 $t-1$ がビッド)である場合、次の価格変化 $\Delta p_t$ が新たな情報なしには生じえないことを示している。すなわち、次の価格変化はゼロ(別の取引もビッドで成立)か $+s$(次がアスク、価格上昇)のいずれかである。同様に、ある時点がアスクである確率はビッドである確率と同じである(価格下落の場合も同様)。

$\Delta p_{t-1} = -s$ がビッドである場合:

|              | $\Delta p_t = -s$ | $\Delta p_t = 0$ | $\Delta p_t = +s$ |
|--------------|:----:|:----:|:----:|
| $\Delta p_{t+1} = -s$ |  0   | 1/4  | 1/4  |
| $\Delta p_{t+1} = 0$  | 1/4  |  0   |  0   |
| $\Delta p_{t+1} = +s$ | 1/4  |  0   |  0   |

$\Delta p_{t-1} = +s$ がアスクである場合:

|              | $\Delta p_t = -s$ | $\Delta p_t = 0$ | $\Delta p_t = +s$ |
|--------------|:----:|:----:|:----:|
| $\Delta p_{t+1} = -s$ |  0   |  0   | 1/4  |
| $\Delta p_{t+1} = 0$  |  0   |  0   | 1/4  |
| $\Delta p_{t+1} = +s$ | 1/4  | 1/4  |  0   |

連続する価格変化の共分散を計算するには、上記2つの結合確率分布を平均すればよい。すなわち、中央の行と中央の列をゼロで埋めて両者を平均する。下記の共分散はこの操作で得られる。

|              | $\Delta p_t = -s$ | $\Delta p_t = 0$ | $\Delta p_t = +s$ |
|--------------|:----:|:----:|:----:|
| $\Delta p_{t+1} = -s$ |  0   | 1/8  | 1/8  |
| $\Delta p_{t+1} = 0$  | 1/8  |  0   | 1/8  |
| $\Delta p_{t+1} = +s$ | 1/8  | 1/8  |  0   |

価格変化どうしの共分散を計算するには、上記の結合確率を用いる。すべての価格変化どうしの積を取り、列ごとに(同様に行ごとに)対称な要素が打ち消し合うことに注意すると、

$$\text{Cov}(\Delta p_t,\, \Delta p_{t+1}) = \tfrac{1}{8}(-s^2 - s^2) = -s^2/4 \tag{1}$$

この式における共分散は、1取引あたりのビッド・アスク・スプレッド $s$ の2乗のみに依存している。同様に、$\Delta p$ の分散は $s^2/2$ となり、自己相関係数は $-\tfrac{1}{2}$ となる。

このスプレッドの大きさは、実効ビッド・アスク・スプレッドを実装可能なかたちで測定するために用いることができる。なぜなら、観測される価格変化の標本共分散は、本論文の主たる関心対象である未知のスプレッドへと直接変換できるからである。価格変化の共分散はマーケットメーカーの利潤の指標と見なせるが、未観測の真の価値変化に支配される。観測される価格変化は2つの要因——真の価値変化とビッド・アスク往復——の和であるが、これらの共分散はゼロでないスプレッドが存在するときに限り非ゼロとなる。したがって、観測される価格変化の標本共分散から、未知のスプレッドが回復される。³

ここで、共分散は連続する2つの価格変化のあいだで測られる点に注意されたい。日次データではなく取引ごとのデータを用いる場合、共分散の推定はより容易で、また小標本においても誤差が小さくなりやすい。ただし、後者のデータは入手が難しいため、本論文の経験分析(第II節を参照)では日次データを用いる。

<div class="pagemark">p.005</div>

他方で、上述の説明的な仮定——すべての取引がマーケットメーカーと行われるという仮定——は無害である。十分に多くの取引が組織化された取引所を経由して成立するとしても、ビッド・アスク往復が起こる確率分布はそれでも成り立つ。とはいえ、絶対的な値そのものは関係なく、ある取引がビッドかアスクのいずれで成立したかにのみ依存する。ここで重要なのは、連続する取引どうしが新しい情報なしには起こりえない、という点である。もちろん、情報的な推定をしようとすれば、より大きな標本のほうが小標本よりも望ましい。これは情報以外の影響が相対的に小さい場合に、より起こりやすい。

第二に、スプレッドに起因する系列共分散の*期待値*は、選んだ時間区間とは独立である。これは、ビッド・アスク往復が連続する取引のあいだで起こるとき、隣り合う観測がいかなるサンプリング間隔をもって取り出されようとも成り立つことを示している。もちろん、推定する際に標本が大きいほうが、より多くの観測が含まれるため望ましい。とはいえ、より大きな標本は、情報以外の往復の影響を相対的に小さくしてしまうため、推定はより難しくなる。

## II. 実効ビッド・アスク・スプレッドの経験的推定および企業規模との関係の検証

一次の価格変化の系列共分散は、上で導いたように実効ビッド・アスク・スプレッドと直接結びついている(式 (1) を参照)。この値を計算してスプレッドの推定値を得るには、価格変化を計算し、それらの一次系列共分散を求めればよい。価格変化どうしの1パーセントの差は、なお小さな価格差を反映する。日次データを用いるのは標本誤差を比較するためである(これは横断面で企業を比較するための関連測度ではない)。

スプレッドが企業規模と負に関係していることを確認するためには、推定されたビッド・アスク・スプレッドが小規模企業ほど高く、大規模企業ほど低いという、横断的に観測可能な性質をもつことを確認するのが有用である。ビッド・アスク・スプレッドはコストの一形態であり、横断面で利用可能な企業規模の代理変数と負に関係しているはずである(デムゼッツ (Demsetz) [2]、コープランド・ガライ (Copeland and Galai) [1] の2つの理由を参照)。これら2つの異なる理由から、測定されたスプレッドと測定された企業規模のあいだには強い負の関係が見込まれる。

この横断的な関係が成り立つという証拠は、次のようにして得られた。各銘柄について、CRSP⁴ の日次標本(1963年から1982年)のうち、(a) 当該年に十分な観測数をもち、かつ (b) 前年の最終日にも価格が存在する、という条件を満たす全銘柄について系列共分散を計算した。各年について系列共分散を計算した。

ここで $\hat{c}_{j,t}$ を時点 $t$ における銘柄 $j$ のリターンの推定系列共分散とする。すると、これまでの分析から、

$$\hat{s}_{j,t} = 200\sqrt{-\hat{c}_{j,t}} \tag{2}$$

は当該銘柄のビッド・アスク・スプレッドの「パーセント」表示の推定値となる(定数200は、単位をパーセント換算するための係数である)。系列共分散の推定値を必要とする2つの理由は、「十分な観測数」が便宜的に21営業日(取引日)以上に設定されたこと、そして年次リターンと21営業日リターンの計算による。

表1には、銘柄ごとに年ごとの横断回帰の結果をまとめた(下に表)。実際、推定された系列共分散が正となる銘柄については、回帰から除外している。実のところ、正の系列共分散が示すのは異常な年、すなわち1968年であった。1968年の最終半期、取引所は紙処理の滞り (paperwork backlog) のため水曜日を閉場していた。おそらく、この1968年の結果は非定型(atypical)であるが、もし非定型でないとしても、そのメカニズムを確実に説明することはできない。

考えられる誤設定 (misspecification) が、このパラメトリック線形回帰に含まれている可能性があるため、横断的なランク相関 (rank correlation) も報告する。これは推定された係数の $t$ 統計量を偏らせかねないからである。最後に、推定された誤差が系列共分散に含まれている場合、横断的に相関した誤差は推定係数の $t$ 統計量を偏らせる。各年の最終列に推定された系列共分散を報告した。横断的な $t$ 統計量はそれでも絶対値において大きく、企業規模と推定スプレッドのあいだの強い負の関係を裏付ける。

回帰における相違は、日次リターンと週次リターンのあいだで非常に小さく、横断的なスロープ係数も規模や有意性において類似している。週次リターンは、いくぶん大きく有意なスロープを生み、ランク相関も類似している。

これとは対照的に、推定スプレッドの平均値の水準には、日次リターンと週次リターンの結果とのあいだに大きな差がある。週次系列共分散から計算されたスプレッドの平均水準は、日次のものよりも大きい。この差はすべての年で大きいが、平均としては日次の結果から導かれるスプレッドより大きい。注意すべきは、週次から導かれた値が、日次から導かれた値よりも時間を通じて安定していることである。これらは

2つの異なる理由から、より強い負の横断的関係が見込まれるべきであり、測定された企業規模と測定されたスプレッドのあいだに強い負の関係が観察される。

これまで、本論文の説明的な仮定——すなわち、すべての取引がマーケットメーカーと無作為に行われるという仮定——は無害であると述べてきた。たとえ多くの取引が組織化された取引所を経由して成立するとしても、ビッド・アスク往復の確率分布はそれでも成り立つ。ただし、絶対的な価格水準そのものは関係なく、ある取引がビッドかアスクのいずれで成立したかにのみ依存する。重要なのは、連続する取引どうしが新しい情報なしには起こりえないという点である。もちろん、情報的な推定をしようとすれば、より大きな標本が小標本より望ましい。これは情報以外の影響が相対的に小さいときに、より起こりやすい。

第二に、スプレッドに起因する系列共分散の*期待値*は、選んだ時間区間とは独立である。これは、ビッド・アスク往復が連続する取引のあいだで起こるとき、隣り合う観測がいかなるサンプリング間隔で取り出されようとも成り立つことを示す。もちろん、推定の際には標本が大きいほど多くの観測を含むため望ましい。とはいえ、より大きな標本は情報以外の往復の影響を相対的に小さくしてしまうため、観測がより少なくなり、推定はより難しくなる。スプレッドはより大きな標本においてのみ確実に推定される。

---

リターン(価格変化ではなく)を用いると、上で導いた説明的な仮定——すべての取引がマーケットメーカーと無作為に行われるという仮定——が無害であることがわかる。たとえ多くの取引が組織化された取引所を経由して成立するとしても、ビッド・アスク往復の確率分布はそれでも成り立つ。

第二に、スプレッドに起因する系列共分散の*期待値*は、選んだ時間区間とは独立である。ここで $R_t$ をリターンとし、$\Delta p_{t-1}$ とおき、パーセント・スプレッド $s_E$ を幾何平均の価格に対するスプレッドと定義すると、価格変化のリターン換算系列共分散は厳密に次式となる。

$$-s_R^2/4 - s_R^4/16 = \text{Cov}(R_{t+1},\, R_t)$$

ここで $R_t$ はリターンで $\Delta p_t / p_{t-1}$ であり、パーセント・スプレッド $s_R$ はビッド価格とアスク価格の幾何平均に対して取られる。すなわち、

$$s_R = s / \sqrt{p_A p_B}$$

ここで $s$ はドル建てスプレッドであり、$p_A$ と $p_B$ はそれぞれアスク価格、ビッド価格である。

$s_E$ は典型的には非常に小さく、3つの価格に近い。すなわち、$s_E$ は安全に無視できる。$s$ のオーダーは大きさにして 0.0000000625 から 0.0000000625 にとどまる。したがって、真のパーセント・スプレッド $s_E$ が3パーセントである場合でも、系列共分散を用いてスプレッドを推定すると、誤差は 3.00033 パーセントとなり、実際には正確である。

どの年についても株式横断的にプラスであるのに対して、日次データから導いた推定値は20年のうち6年でマイナスの平均を示している。

日次データを用いると、実効的な買い気配・売り気配スプレッド（Effective Bid-Ask Spread）の全銘柄・全期間にわたる平均値は0.298パーセントとなる。これは平均的な*実効*スプレッドの推定値であり、提示スプレッド（quoted spread）よりは小さいはずである。ただし、提示スプレッドの最小値は1ドルの8分の1（＄1/8）であり、これは＄37.50で取引される株式のおよそ0.3パーセントに相当する。このことから、平均的なNYSE上場銘柄の値段が＄37.50を大きく下回ることはないとしても、これは高すぎる値ではないと考えられる。週次データから推定した実効スプレッドの平均値は1.74パーセントであり、これは平均的な全銘柄に対する妥当な範囲としてはやや高すぎる。

日次データと週次データから得られるスプレッド推定値の差は、小さいほうのサンプルサイズ（週次計算）に起因する大きな標本誤差によって生じうる程度に大きすぎる。これは（付録Bを参照）、各年について差の対応のある（paired）*t*検定を行うことで確認できる。すなわち、差 $d_{jt} = \hat{s}_{Djt} - \hat{s}_{Wjt}$ を、銘柄 $j$ と年 $t$ について、5日間（$\hat{s}_{Djt}$）と1日間（$\hat{s}_{Wjt}$）のリターンから計算したスプレッド推定値の差として算出する。$d_{jt}$ の横断面平均を、有意性検定のために年 $t$ ごとに $t$ 統計量を用いて評価する。20年間の $t$ 値の最小値は5.94であり、20年間の平均 $t$ 値は16.6であった。65658個の値の $d_{jt}$ のうち、29611個、すなわち63.5パーセントがプラスであった。

観測間隔をより長くすると、これらの推論から導かれる差はさらに大きくなるため、ニューヨーク証券取引所およびアメリカン証券取引所が情報的に完全に効率的であるという主張には疑問が生じる。非効率性の程度は、経済的に無意味であるほど小さく、スプレッドの推定問題を引き起こすほどには大きいようである。どうやら日次リターンは、わずかにプラスの系列依存性を示すようである。週次リターンはおそらく、これと非効率性に起因するプラスの系列依存性をいくぶん相殺するマイナスの依存性を示すのであろう。

別の可能性として、平均リターンが定常でない（nonstationary）ことが考えられる。価格変化におけるプラスの依存性は、ある期間が長期間にわたって危険にさらされている間に減衰しうる。日次スプレッドより週次スプレッドにおいて非定常性が大きくなるが、その説明としての説得力は劣る。しかし、非効率性に起因しないこのような系列共分散を説明するには、より複雑な型の非定常性が必要となる可能性がある。だが、市場の非効率性なのか非定常性なのか、あるいはその両方なのかを判定するためには、より多くの研究が必要である。$^{6}$

# III. 要約（Summary）

実効的な買い気配・売り気配スプレッド（Effective Bid-Ask Spread）は、市場が情報的に効率的であるという条件のもとで、価格変化の一次の系列共分散から推定できる。スプレッドの推定値（パーセント表示）は次式で与えられる。

$$s_j = 200\sqrt{-\overline{\mathrm{cov}}_j}$$

ここで $s_j$ はスプレッドであり、$\mathrm{cov}_j$ は資産 $j$ のリターンの一次系列共分散である。

この取引コストの推定値は、日次データおよび

週次リターンのストックおよび時系列にわたって、ニューヨーク証券取引所とアメリカン証券取引所のデータを用いて算出された。結果として得られたスプレッドの推定値は、年ごとのサンプルサイズの小ささに起因しうる程度より大きな差を、日次推定値と週次推定値の間で示す。この差は、市場の非効率性、リターンの非定常性、あるいはその両方を示唆している。

# 付録A（Appendix A）

以下は次の証明である。(A) 共分散がリターン間のサプライズに起因して変化する場合、市場が情報的に効率的であれば、提示された価格変化の独立性は維持される。(B) より長い間隔をとっても、独立した価格変化を仮定した場合に得られる結果と同じ結果が得られる。(C) 提示価格変化に非対称性があれば、観測された価格変化は非独立となりうる。記号 $\Delta$（増分演算子）は通常どおり値の「変化」を表し、角括弧はカッコ内の量の「値」を表す。観測された価格変化 $\Delta p_t$ はサンプルから観測される。

(A) サプライズが市場に到達したとき、実効スプレッド（Effective Spread）は、サプライズの結果として、提示価格変化 $\Delta p_t$ の確率分布に偏りを生じさせる。これは本文の表（table）に示されている。$t$ 時点における観測価格変化、すなわち市場で実際に観測される変化 $\Delta p_t$ は次式で与えられる。

$$\Delta \hat{p}_t = \Delta p_t^* + \Delta p_t$$

ここで $\Delta p_t$ は取引コストの構成要素であり、提示価格変化の確率分布を、本文の表に示されたものとする。

すべての $j \neq 0$ について、提示価格変化 $\Delta p_t$ が独立であると仮定する。ここでも次の関係が必要となる。

$$\mathrm{Cov}(\Delta p_t^*, \, \Delta p_{t-j}^*) = 0 \qquad j \neq 0 \tag{A1}$$

さらに次も必要である。

$$\mathrm{Cov}(\Delta p_t^*, \, \Delta p_{t-1}) = 0 \tag{A2}$$

(A1) の最初の共分散は、リターン間のサプライズに起因して変化が生じるためにゼロとなる。提示価格における変化、すなわちサプライズに起因しない変化は独立であるため、(A2) におけるその共分散もゼロとなる。値 $j \neq 0$ における共分散についても同様の議論が成り立つ。

(A1) と (A2) を用いると、次が得られる。

$$\mathrm{Cov}(\Delta \hat{p}_t, \, \Delta \hat{p}_{t-1}) = \mathrm{Cov}(\Delta p_t^* + \Delta p_t, \, \Delta p_{t-1}^* + \Delta p_{t-1})$$
$$= \mathrm{Cov}(\Delta p_t, \, \Delta p_{t-1}) = -s^2/4.$$

<div class="pagemark">p.011</div>

(B) 次に、より長い間隔についての共分散の計算を考える。長い間隔における価格変化、すなわち時間間隔 $N$ にわたる価格変化は、$N$ 個の単位間隔の変化 $\Delta j$ の単純な和である。すなわち、

$$\Delta \hat{p}_T \equiv \sum_{(T-1)N+1}^{T \cdot N} \Delta \hat{p}_t$$

ここで $T$ は、より長い間隔を表すインデックスである。したがって、

$$\Delta \hat{p}_T = \Delta p_T^* + \Delta p_T$$

ここで $\Delta p_T^*$ と $\Delta p_T$ はそれぞれ、より長い間隔における価格変化の新情報成分と取引コスト成分である。

長い間隔における提示価格変化 $\Delta p_T$ の和は、本文の表に示された分布とまったく同じ分布をもつ。なぜなら、ある長い間隔における取引コスト成分が、独立した提示成分に依存しないからである。長い間隔について、$N$ 個の隣接する区間がいずれも提示成分の符号を逆転させない確率が高い。すると、$T$ 時点と $T+1$ 時点における取引コスト成分は完全に独立であり、本文と同じ共分散 $-s^2/4$ をもたらす。例えば、$N = 2$ の図は、$N = 2$ の場合についての本文の単純な事例と類似している。

[図：Ask / Bid / Spread / Value の模式図。$T$ と $T+1$ における買い気配・売り気配と価値（Value）の関係を示すツリー状の図。]

一般に、$2^N$ 個の可能な経路（path）が、時間 $T-1$ と $T$ の間に存在する。価格 $T-1$ は始点であり、価格 $T$ から $2^N$ 個の可能な経路が存在する。$T$ から $T+1$ への経路もすべて存在する。すべての経路は、図がもたらすそのような対応関係を等しい確率で生み出す。すなわち $\mathrm{Cov}(\Delta \hat{p}_T, \Delta \hat{p}_{T+1}) = -s^2/4$ である。

連続する区間が独立であるためには、(A1) と (A2) が同じ仮定のもとで成り立つことが直接的に示される。値 $j \neq 0$ の共分散についても、$\mathrm{Cov}(\Delta \hat{p}_T, \Delta \hat{p}_{T+j}) = 0$ が成り立ち、これは $N$（すなわち測定区間の数）に依存しない。

(C) ここで、提示スプレッドが情報によって変化する可能性を考える。提示スプレッドが情報によって変化したとしても、提示価格変化がやはり対称的であれば、本文の単純な模式図を以下のように一般化することなく示すことができる。

[図：Old Value（古い価値）と New Value（新しい価値）の間の遷移を示す模式図。$t-1$、$t$、$t+1$ の各時点における価値の変化を表すツリー状の図。]

<div class="pagemark">p.012</div>

スプレッド $s$ における価値の変化 $t-1$ から $t$ は $\pm s/2$、スプレッド $s'$ における価値の変化 $t$ から $t+1$ は $\pm s'/2$ となる。観測される価格変化は、価値の変化（矢印で示される）に取引コストを加えたものである。ここでも、新情報に起因する価値の変化が独立であるという仮定のもとで、対称性の仮定を用いて結合確率分布を導くことができる。

$$\mathrm{Cov}(\Delta p_{t-1}^*, \, \Delta p_t) = \mathrm{Cov}(\Delta p_t^*, \, \Delta p_{t-1}) = 0$$

この場合も依然として成り立つ。さらに、観測価格変化の一次系列共分散が *観測された* 系列共分散を保証する。$\Delta p_t^*$ と $\Delta p_{t-1}$ の符号が独立であるという対称性の仮定のもとで、観測価格変化 $\Delta p_t$ の結合確率分布は次のようになる。

|  |  | $\Delta p_t$ |  |  |  |
|---|---|:---:|:---:|:---:|:---:|
|  |  | $-s_{t-1} - \Delta s/2$ | $-\Delta s/2$ | $\Delta s/2$ | $s_{t-1} + \Delta s/2$ |
|  | $-s_t$ | 0 | 0 | 1/8 | 1/8 |
| $\Delta p_{t+1}$ | $0$ | 1/8 | 1/8 | 1/8 | 1/8 |
|  | $s_t$ | 1/8 | 1/8 | 0 | 0 |

ここで $\Delta s = s_t - s_{t-1}$ である。しかし、この結合確率分布から、$\mathrm{Cov}(\Delta p_t, \Delta p_{t+1}) = -s_t^2/4$ であることが直接的に検証できる。

驚くべきことに、スプレッドが情報によって変動するという唯一の事実が、本文で導いた公式のもとで成立し、提示スプレッドの分散が拡散していてもなお、提示スプレッドの平均のもとで導かれた仮定のもとで成立する。観測された系列共分散はやはり、スプレッドの公式に関連して、同じ単純な公式で表される。

$t-1$ から $t$、$t$ から $t+1$ について計算されるサンプル・クロス積については、次式が成り立つ。

$$E[\Delta p_t, \, \Delta p_{t+1}] = -s_t^2/4.$$

したがって、サンプル全体についての共分散の期待値は次式となる。

$$E\!\left[\sum_t (\Delta p_t, \Delta p_{t+1}) / \tau\right] = -\bar{s}^2/4, \qquad t = 1, \cdots, \tau,$$

ここで $\bar{s}^2$ はサンプル期間中の二乗スプレッドの平均である。したがって、この公式は任意の変動するスプレッドにも適用できる。例えば、提示スプレッドの非定常な分散を、リターンの非定常な共分散として扱ったとしても、本文の公式は依然として有効である。実際には、リターンの非定常性、すなわちスプレッドの公式が依然として有効であるような単純な公式の例として有効である。

# 付録B（Appendix B）

## スプレッドの標本推定量におけるバイアス（The Bias in the Sample Estimator of Spread）

ジェンセンの不等式（Jensen's inequality）により、スプレッドの標本推定量（式(2)の平方根）は、小標本においてバイアスをもつ。この付録は、近似的なバイアスの大きさについて論じる。

<div class="pagemark">p.013</div>

バイアスが生じるのは、式 (1) における価格変化の真の自己共分散を、式 (2) のスプレッドの値について解くからである。しかし、自己共分散の標本推定値しか得られないため、平方根変換はよく知られたジェンセンの不等式 (Jensen's inequality) の問題を引き起こす。すなわち、

$$
E(\hat{c}) = c = -s^2/4,
$$

ここで $\hat{\;}$ は標本推定値を表し、$c$ は一次の系列共分散を表す。すると、

$$
E(\hat{s}) = E[2\sqrt{-\hat{c}}] < 2\sqrt{-E(\hat{c})} = s,
$$

となり、標本推定量 $\hat{s}$ は下方にバイアスをもつ。

おおよそのバイアスの大きさを求めるため、まず関数 $E(\hat{s})$ をテイラー級数に展開する。$\epsilon \equiv \hat{c} - c$ を系列共分散の推定における標本誤差と定義する。$E(\hat{s})$ を $\sqrt{-c}$ のまわりに展開し、3次より高次の項を落とすと、次が得られる。

$$
E(\hat{s}) = 2E\!\left[\sqrt{-c} + \epsilon \cdot \frac{\partial}{\partial c}\sqrt{-c} + \frac{\epsilon^2}{2}\frac{\partial^2}{\partial c^2}\sqrt{-c} + \cdots\right]
$$

$$
= s - 2\sigma_\epsilon^2/s^3 \tag{B1}
$$

ここで $\sigma_\epsilon^2$ は系列共分散の推定誤差分散である。

$\sigma_\epsilon^2$ の表現は、フラー (Fuller) [5, Section 6.2, pp. 236–44] に与えられているような漸近公式から得られる。フラーの公式 (6.2.2) と定理 6.2.2 を用いると、

$$
\lim_{n\to\infty}(n-1)\sigma_\epsilon^2 = (\eta - 3)c^2 + \sum_{p=-\infty}^{\infty}\bigl[\gamma^2(p) + \gamma(p+1)\gamma(p-1)\bigr]
$$

ここで $n$ は時系列の標本サイズ、$\eta$ は価格変化の尖度 (kurtosis)(正規分布であれば3に等しい)、$\gamma(p)$ は次数 $p$ の(真の)系列共分散である。本ケースでは $-1 \le p \le 1$ を除いて $\gamma(p) = 0$ であり、$\gamma(-1) = \gamma(1) = c = -s^2/4$、$\gamma(0) = s^2/2$ である。したがって、$\sigma_\epsilon^2$ は次のように推定できる。

$$
\sigma_\epsilon^2 = \frac{1}{n-1}\bigl[(\eta - 3)c^2 + \gamma^2(-1) + \gamma^2(0) + \gamma^2(1) + \gamma(-1)\gamma(1)\bigr]
$$

$$
= \frac{s^4}{16(n-1)}\bigl[(\eta - 3) + 7\bigr]. \tag{B2}
$$

(B2) の推定値 $\sigma_\epsilon^2$ を (B1) に代入すると、

$$
E(\hat{s}) = s\left[1 - \frac{(\eta - 3) + 7}{8(n-1)}\right]. \tag{B3}
$$

を得る。正規分布のデータでは、$\eta - 3$ の項が消える。きわめて裾の厚い

<div class="pagemark">p.014</div>

裾の厚い分布($\eta = 6$)であっても、バイアスは $s$ のおよそ0.5パーセントにすぎない。最小の標本サイズは21観測であり、その場合のバイアスは最大で約6パーセントとなりうる。
